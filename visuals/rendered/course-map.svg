<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1750" viewBox="0 0 1180 1750" role="img" aria-labelledby="title desc">
  <title id="title">Bio Memory Rust Lab course map</title>
  <desc id="desc">A seventeen lesson path with school activities on the left and university activities on the right.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
