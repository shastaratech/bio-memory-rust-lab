  <rect class="bg" width="1180" height="1750" />
  <text class="title" x="48" y="54">Bio Memory Rust Lab Course Map</text>
  <text class="subtitle" x="48" y="80">A path from molecule cards to Rust data structures, graph algorithms, traits, quantum state, CLI tools, DNA memory, visual algorithms, design search, library indexes, fingerprints, screening feedback, lab records, typed measurements, uncertainty, and dose-response curves.</text>

