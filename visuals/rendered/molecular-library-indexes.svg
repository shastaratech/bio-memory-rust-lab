<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Molecular library indexes</title>
  <desc id="desc">A molecule record vector feeding name hash maps, formula buckets, sorted lists, binary search, and merge.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355070" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #516070; }
      .box { fill: #ffffff; stroke: #355070; stroke-width: 2; rx: 14; ry: 14; }
      .index { fill: #eaf7f1; stroke: #2f946d; }
      .query { fill: #fff4df; stroke: #d9902f; }
      .text { font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .small { font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #3b4658; }
      .arrow { stroke: #355070; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="980" height="560" />
  <text class="title" x="42" y="52">Molecular Library Indexes</text>
  <text class="subtitle" x="42" y="78">The same molecule records can be organized for listing, lookup, grouping, sorting, merging, and range search.</text>

  <rect class="box" x="350" y="122" width="280" height="74" />
  <text class="text" x="374" y="151">Vec&lt;MoleculeRecord&gt;</text>
  <text class="small" x="374" y="173">library shelf: water, methane, ethanol</text>

  <rect class="box index" x="56" y="260" width="240" height="76" />
  <text class="text" x="80" y="290">HashMap name → record</text>
  <text class="small" x="80" y="312">direct lookup: ethanol</text>

  <rect class="box index" x="370" y="260" width="240" height="76" />
  <text class="text" x="394" y="290">HashMap formula → Vec</text>
  <text class="small" x="394" y="312">bucket query: H2O</text>

  <rect class="box index" x="684" y="260" width="240" height="76" />
  <text class="text" x="708" y="290">Sorted Vec by atom count</text>
  <text class="small" x="708" y="312">water(3), methane(5), ethanol(9)</text>

  <rect class="box query" x="56" y="414" width="240" height="72" />
  <text class="text" x="80" y="443">Direct query</text>
  <text class="small" x="80" y="464">find one record by key</text>

  <rect class="box query" x="370" y="414" width="240" height="72" />
  <text class="text" x="394" y="443">Grouped query</text>
  <text class="small" x="394" y="464">one formula, many names</text>

  <rect class="box query" x="684" y="414" width="240" height="72" />
  <text class="text" x="708" y="443">Range + merge query</text>
  <text class="small" x="708" y="464">binary search and merge sorted lists</text>

  <path class="arrow" d="M380 196 C300 220 235 232 180 256" />
  <path class="arrow" d="M490 196 L490 256" />
  <path class="arrow" d="M600 196 C680 220 745 232 800 256" />
  <path class="arrow" d="M176 336 L176 410" />
  <path class="arrow" d="M490 336 L490 410" />
  <path class="arrow" d="M804 336 L804 410" />
</svg>
