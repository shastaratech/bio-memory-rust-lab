<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-labelledby="title desc">
  <title id="title">Replicates and uncertainty</title>
  <desc id="desc">Replicate responses are validated, stored as a vector, summarized by mean, range, and sample standard deviation, then interpreted for feedback decisions.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355070" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #516070; }
      .box { fill: #ffffff; stroke: #355070; stroke-width: 2; rx: 14; ry: 14; }
      .stat { fill: #eaf7f1; stroke: #2f946d; }
      .decision { fill: #fff4df; stroke: #d9902f; }
      .label { font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .small { font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #3b4658; }
      .arrow { stroke: #355070; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1080" height="470" />
  <text class="title" x="42" y="52">Replicates, Variability, And Uncertainty</text>
  <text class="subtitle" x="42" y="78">Repeated responses need validation and spread summaries before interpretation.</text>

  <rect class="box" x="44" y="154" width="170" height="78" />
  <text class="label" x="68" y="184">Replicates</text>
  <text class="small" x="68" y="206">40, 44, 46</text>

  <rect class="box" x="252" y="154" width="146" height="78" />
  <text class="label" x="276" y="184">Validate</text>
  <text class="small" x="276" y="206">finite, 0..100</text>

  <rect class="box" x="436" y="154" width="170" height="78" />
  <text class="label" x="460" y="184">ReplicateSeries</text>
  <text class="small" x="460" y="206">vector of values</text>

  <rect class="box stat" x="654" y="88" width="126" height="66" />
  <text class="label" x="678" y="117">Mean</text>
  <text class="small" x="678" y="137">center</text>

  <rect class="box stat" x="654" y="184" width="126" height="66" />
  <text class="label" x="678" y="213">Range</text>
  <text class="small" x="678" y="233">max - min</text>

  <rect class="box stat" x="654" y="280" width="126" height="66" />
  <text class="label" x="678" y="309">Std dev</text>
  <text class="small" x="678" y="329">spread</text>

  <rect class="box decision" x="828" y="184" width="190" height="78" />
  <text class="label" x="852" y="214">Interpretation</text>
  <text class="small" x="852" y="236">signal + uncertainty</text>

  <rect class="box decision" x="828" y="322" width="190" height="78" />
  <text class="label" x="852" y="352">Feedback decision</text>
  <text class="small" x="852" y="374">trust, repeat, inspect</text>

  <path class="arrow" d="M214 193 L248 193" />
  <path class="arrow" d="M398 193 L432 193" />
  <path class="arrow" d="M606 193 C626 148 636 122 650 120" />
  <path class="arrow" d="M606 193 L650 215" />
  <path class="arrow" d="M606 193 C626 256 636 308 650 312" />
  <path class="arrow" d="M780 121 C810 132 822 170 824 204" />
  <path class="arrow" d="M780 217 L824 222" />
  <path class="arrow" d="M780 313 C812 300 824 266 828 240" />
  <path class="arrow" d="M923 262 L923 318" />
</svg>
