<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">Toy fingerprints and similarity search</title>
  <desc id="desc">A molecule graph becomes feature questions, then a bitset fingerprint, then intersection, union, similarity scoring, and sorted matches.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355070" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #516070; }
      .box { fill: #ffffff; stroke: #355070; stroke-width: 2; rx: 14; ry: 14; }
      .bit { fill: #eaf7f1; stroke: #2f946d; }
      .score { fill: #fff4df; stroke: #d9902f; }
      .text { font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .small { font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #3b4658; }
      .bits { font: 700 18px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #172033; }
      .arrow { stroke: #355070; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1040" height="430" />
  <text class="title" x="42" y="52">Toy Fingerprints And Similarity Search</text>
  <text class="subtitle" x="42" y="78">Represent molecule features as bits, compare shared features, then sort records by similarity.</text>

  <rect class="box" x="42" y="140" width="170" height="84" />
  <text class="text" x="66" y="170">Molecule graph</text>
  <text class="small" x="66" y="192">atoms + bonds</text>

  <rect class="box" x="250" y="140" width="190" height="84" />
  <text class="text" x="274" y="170">Feature questions</text>
  <text class="small" x="274" y="192">has O? has C-C bond?</text>

  <rect class="box bit" x="478" y="126" width="190" height="112" />
  <text class="text" x="502" y="158">ToyFingerprint</text>
  <text class="bits" x="502" y="190">10111010</text>
  <text class="small" x="502" y="216">u64 as compact bitset</text>

  <rect class="box" x="706" y="94" width="150" height="76" />
  <text class="text" x="730" y="124">Intersection</text>
  <text class="small" x="730" y="146">shared bits</text>

  <rect class="box" x="706" y="218" width="150" height="76" />
  <text class="text" x="730" y="248">Union</text>
  <text class="small" x="730" y="270">bits in either</text>

  <rect class="box score" x="894" y="140" width="110" height="84" />
  <text class="text" x="918" y="170">Score</text>
  <text class="small" x="918" y="192">shared / union</text>

  <rect class="box score" x="416" y="314" width="250" height="64" />
  <text class="text" x="440" y="342">Sorted matches</text>
  <text class="small" x="440" y="362">nearest records first</text>

  <path class="arrow" d="M212 182 L246 182" />
  <path class="arrow" d="M440 182 L474 182" />
  <path class="arrow" d="M668 166 C684 148 690 136 702 132" />
  <path class="arrow" d="M668 202 C684 228 690 244 702 256" />
  <path class="arrow" d="M856 132 C874 142 880 154 890 170" />
  <path class="arrow" d="M856 256 C874 244 880 224 890 194" />
  <path class="arrow" d="M949 224 C900 318 760 346 670 346" />
</svg>
