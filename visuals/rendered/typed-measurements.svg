<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="410" viewBox="0 0 1080 410" role="img" aria-labelledby="title desc">
  <title id="title">Typed measurements and assay observations</title>
  <desc id="desc">A raw value receives a unit, becomes a typed concentration, is validated, normalized, attached to an assay observation, and used for sorting, averaging, or feedback.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#355070" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #516070; }
      .box { fill: #ffffff; stroke: #355070; stroke-width: 2; rx: 14; ry: 14; }
      .ok { fill: #eaf7f1; stroke: #2f946d; }
      .warn { fill: #fff4df; stroke: #d9902f; }
      .label { font: 700 15px system-ui, -apple-system, Segoe UI, sans-serif; fill: #172033; }
      .small { font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #3b4658; }
      .mono { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #172033; }
      .arrow { stroke: #355070; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1080" height="410" />
  <text class="title" x="42" y="52">Typed Measurements And Assay Observations</text>
  <text class="subtitle" x="42" y="78">Keep value, unit, validation, and assay context together before comparing measurements.</text>

  <rect class="box warn" x="42" y="156" width="124" height="78" />
  <text class="label" x="66" y="186">Raw value</text>
  <text class="mono" x="66" y="210">500</text>

  <rect class="box" x="204" y="156" width="132" height="78" />
  <text class="label" x="228" y="186">Attach unit</text>
  <text class="mono" x="228" y="210">500 nM</text>

  <rect class="box ok" x="374" y="142" width="166" height="106" />
  <text class="label" x="398" y="174">Concentration</text>
  <text class="small" x="398" y="198">value + unit enum</text>
  <text class="small" x="398" y="220">typed measurement</text>

  <rect class="box" x="578" y="156" width="136" height="78" />
  <text class="label" x="602" y="186">Validate</text>
  <text class="small" x="602" y="208">finite, non-negative</text>

  <rect class="box" x="752" y="156" width="140" height="78" />
  <text class="label" x="776" y="186">Normalize</text>
  <text class="small" x="776" y="208">convert to uM</text>

  <rect class="box ok" x="930" y="142" width="116" height="106" />
  <text class="label" x="948" y="174">Observation</text>
  <text class="small" x="948" y="198">candidate</text>
  <text class="small" x="948" y="218">dose + response</text>

  <path class="arrow" d="M166 195 L200 195" />
  <path class="arrow" d="M336 195 L370 195" />
  <path class="arrow" d="M540 195 L574 195" />
  <path class="arrow" d="M714 195 L748 195" />
  <path class="arrow" d="M892 195 L926 195" />
</svg>
