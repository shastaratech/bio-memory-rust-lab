name: Rust exercises

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-molecule-model:
    name: rust-molecule-model
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        working-directory: exercises/rust-molecule-model
        run: cargo test
